# EGoTouchRev 出厂默认配置 v2
# 每个键均有文档注释。用户覆盖请编辑 config/overrides.yaml。

service:
  mode: full                     # full | touch_only 服务运行模式
  auto_mode: true                # 自动选择服务模式
  stylus_vhf_enabled: true       # 是否启用 stylus VHF 输出
  pen_button_mode: oem_custom    # oem_custom | native_barrel | native_eraser
  pen_button_route: vhf_only     # vhf_only | win32_only | vhf_and_win32

touch:
  signal_cond:
    baseline_enabled: true            # Baseline tracking enabled
    baseline_value: 32750             # 0..65535 Initial baseline value
    baseline_noise_deadband: 90       # 0..4095 Noise tracking deadband
    baseline_positive_deadband: 14    # 0..4095 Positive tracking deadband
    baseline_negative_deadband: 13    # 0..4095 Negative tracking deadband
    baseline_peak_threshold: 305      # 1..2000 Baseline freeze threshold
    baseline_release_hold_frames: 60  # 0..600 Release hold frames
    baseline_positive_alpha_shift: 7  # 0..15 Positive alpha shift
    baseline_negative_alpha_shift: 5  # 0..15 Negative alpha shift
    baseline_noise_alpha_shift: 6     # 0..15 Noise alpha shift
    baseline_bg_alpha_shift: 3        # 0..15 背景基线 alpha 移位
    baseline_bg_max_step: 512         # 1..2048 背景基线最大步长
    baseline_no_finger_alpha_shift: 3 # 0..15 无手指基线 alpha 移位
    baseline_no_finger_max_step: 512  # 1..2048 无手指基线最大步长
    baseline_positive_max_step: 20    # 1..2048 Positive max step
    baseline_negative_max_step: 20    # 1..2048 Negative max step
    baseline_recovery_alpha_shift: 2  # 0..15 恢复阶段 alpha 移位
    baseline_recovery_max_frames: 30  # 1..120 恢复阶段最大帧数
    baseline_recovery_max_step: 256   # 1..2048 恢复阶段最大步长
    baseline_noise_tracking_enabled: true # Noise tracking enabled
    cmf_enabled: true                 # CMF enabled
    cmf_exclusion_threshold: 2000     # 0..32767 CMF exclusion threshold
    cmf_max_correction: 2000          # 0..32767 CMF max correction
  frame_parser:
    enabled: true                     # Frame Parser Enabled
  peak_detection:
    threshold: 350                    # 0..4095 Peak detection threshold
    max_peaks: 20                     # 1..128 Maximum peak count
    local_max_radius: 1               # 1..5 Local maximum radius
    edge_threshold_enabled: true      # Edge-specific threshold enabled
    edge_threshold: 300               # 0..4095 Edge-specific threshold
    z8_filter_enabled: true           # Z8 filter enabled
    z1_filter_enabled: true           # Z1 filter enabled
    close_peak_saddle_filter_enabled: true # Close-peak saddle filter enabled
    close_peak_radius: 2              # 1..8 Close-peak saddle radius
    macro_zone_min_area: 4            # 1..128 Macro zone minimum area
  classifier:
    enabled: true                     # Touch classifier enabled
    analyzer_enabled: true            # Touch analyzer enabled
    peak_eval_enabled: true           # Peak evaluation enabled
    area_threshold: 50                # 0..500 Touch area threshold
    signal_sum_threshold: 80000       # 0..1000000 Touch signal sum threshold
    finger_prominence: 100            # 0..4095 Finger peak prominence threshold
    finger_sharpness: 3.35            # 0..100 Finger sharpness threshold
    palm_sharpness_max: 3.3           # 0..100 Palm sharpness maximum
    palm_aware_expansion_enabled: true # Palm-aware expansion enabled
    finger_in_palm_threshold_ratio: 0.7 # 0..1 Finger-in-palm threshold ratio
    finger_in_palm_max_radius: 3      # 0..16 Finger-in-palm max expansion radius
  zone_contact:
    threshold_scale_numer: 64         # Zone threshold scale numerator
    threshold_scale_shift: 7          # Zone threshold scale shift
    dilate_erode_enabled: true        # Zone dilate/erode enabled
    max_touches: 10                   # 1..20 Maximum zone touches
    edge_width_threshold: 300         # 0..4095 Zone edge width threshold
    touch_size_pixel_pitch_mm: 4.5    # Pixel pitch in mm
    touch_size_unit_per_sig_mm2: 128  # Touch size unit per signal mm2
  edge:
    enabled: true                     # Edge compensation enabled
    comp_strength: 1.0                # Edge compensation strength
    full_comp_range: 0.5              # Edge full compensation range
    blend_range: 0.505                # Edge blend range
    reject_enabled: true              # Edge rejection enabled
    reject_margin: 2                  # Edge rejection margin
  tracking:
    enabled: true                     # Touch tracking enabled
    max_touch_count: 20               # Maximum touch count
    max_track_distance: 4.985         # Maximum track matching distance
    always_match_distance: 2.0        # Always-match distance
    gap_relink_enabled: true          # Gap relink enabled
    gap_relink_window_frames: 4       # Gap relink window frames
    touch_down_debounce_frames: 1     # Touch-down debounce frames
    dynamic_debounce_enabled: true    # Dynamic debounce enabled
    use_hungarian: true               # Hungarian matching enabled
  stylus_suppress:
    global_enabled: true              # Global stylus suppression enabled
    local_enabled: true               # Local stylus suppression enabled
    local_distance: 2.5               # Local stylus suppression distance
    pen_peak_threshold: 1500          # Stylus suppression pen peak threshold
    aft_enabled: true                 # After-stylus suppression enabled
    aft_recent_frames: 24             # After-stylus recent frames
    aft_radius: 2.8                   # After-stylus suppression radius
  coord_filter:
    enabled: true                     # Coordinate filter enabled
    min_cutoff: 4.404                 # Coordinate filter minimum cutoff
    beta: 0.5                         # Coordinate filter beta
    d_cutoff: 1.0                     # Coordinate filter derivative cutoff
  gesture:
    enabled: true                     # Gesture state machine enabled
    press_candidate_frames: 1         # Press candidate frames
    drag_threshold: 0.8               # Drag threshold
    long_press_frames: 46             # Long press frames
    release_pending_frames: 0         # Release pending frames
    bypass_state_machine: false       # Bypass gesture state machine

stylus:
  sp:
    frame_parser_enabled: true                # Frame Parser Enabled
    peak_detector_enabled: true               # Peak Detector Enabled
    coordinate_solver_enabled: true           # Coordinate Solver Enabled
    tilt_process_enabled: true                # Tilt Process Enabled
    pressure_solver_enabled: true             # Pressure Solver Enabled
    post_pressure_enabled: true               # Post Pressure Enabled
    fake_pressure_decrease_enabled: false     # Fake Pressure Decrease Enabled
    bt_freq_shift_debounce_frames: 2          # 0..255 BT Freq Shift Debounce Frames
    pressure_edge_enter_threshold: 1500       # 0..65535 Pressure Edge Enter Threshold
    pressure_edge_exit_threshold: 3000        # 0..65535 Pressure Edge Exit Threshold
    tip_down_pressure_threshold: 1            # 0..4095 Tip Down Pressure Threshold
    bt_press_signal_suppress_enter_threshold: 2200 # 0..65535 BT Press Suppress Enter Threshold
    bt_press_signal_suppress_exit_threshold: 3200 # 0..65535 BT Press Suppress Exit Threshold
    signal_floor: 64                          # 0..65535 Signal Floor
    edge_coor_enabled: true                   # Edge Coor Process Enabled
    edge_coor_post_enabled: true              # Edge Coor Post Process Enabled
    noise_post_enabled: true                  # Noise Post Process Enabled
    noise_signal_ratio_thold: 5               # 1..16 Noise Signal Ratio Threshold
    noise_signal_drop_ratio: 5                # 1..16 Noise Signal Magnitude Drop Ratio
    linear_filter_enabled: true               # Linear Filter Enabled
    coor_revise_enabled: true                 # CoorRevise Enabled
    coor_revise_factor_dim1: 5                # 0..255 CoorRevise Factor Dim1
    coor_revise_factor_dim2: 5                # 0..255 CoorRevise Factor Dim2
    coor_speed_enabled: true                  # Coor Speed Enabled
    iir_filter_enabled: true                  # IIR Filter Enabled
    iir_coef_low_hover: 2                     # 0..255 IIR Coef Low Hover
    iir_coef_high_hover: 16                   # 0..255 IIR Coef High Hover
    iir_speed_thold_hover: 20                 # 0..255 IIR Speed Thold Hover
    iir_coef_low_writing: 6                   # 0..255 IIR Coef Low Writing
    iir_coef_high_writing: 18                 # 0..255 IIR Coef High Writing
    iir_speed_thold_writing: 10               # 0..255 IIR Speed Thold Writing
    iir_speed_max: 205                        # 0..1000 IIR Speed Max
    iir_max_coef: 32                          # 0..255 IIR Max Coef (Denominator)
    aft_coor_enabled: true                    # AFT Coor Process Enabled
    lock_flash_in_band_x: 0                   # 0..255 Lock Flash In-Band X
    lock_flash_in_band_y: 0                   # 0..255 Lock Flash In-Band Y
    lock_flash_edge_x: 1                      # 0..255 Lock Flash Edge X
    lock_flash_edge_y: 2                      # 0..255 Lock Flash Edge Y
    lock_sensor_tx_count: 60                  # 1..200 Lock Sensor TX Count
    lock_sensor_rx_count: 40                  # 1..200 Lock Sensor RX Count
    lock_bypass: false                        # Lock Bypass
