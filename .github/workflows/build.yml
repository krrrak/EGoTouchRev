name: Native ARM64 Build Verification (clang-cl)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-arm64:
    # Use the native GitHub-hosted Windows ARM64 runner
    runs-on: windows-11-arm
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure MSVC for ARM64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - name: CMake Configure (clang-cl)
        # On a native ARM64 host, we can use the ARM64-native clang-cl
        # No need for cross-compilation flags (CMAKE_SYSTEM_NAME etc.)
        # but we preserve them to be explicit.
        run: |
          cmake -G "Ninja" -S . -B build `
                -DCMAKE_BUILD_TYPE=Release `
                -DCMAKE_C_COMPILER=clang-cl `
                -DCMAKE_CXX_COMPILER=clang-cl `
                -DHIMAX_ENABLE_NEON=ON `
                -DEGO_BUILD_TESTS=ON

      - name: CMake Build
        run: cmake --build build --config Release --parallel

      - name: Run Unit Tests (Native)
        # Since we are on an ARM64 host, we can now actually RUN the tests!
        working-directory: build
        run: |
          # Only running HostSystemStateMonitorTest as it doesn't require hardware
          if (Test-Path "HostSystemStateMonitorTest.exe") {
            .\HostSystemStateMonitorTest.exe
          }

      - name: Determine Version
        id: version
        run: |
          $version = "1.0.0"
          if ($env:GITHUB_REF -match "^refs/tags/v?(.*)$") {
            $version = $matches[1]
          }
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV
          echo "Resolved Version: $version"

      - name: Install WiX Toolset
        run: dotnet tool install --global wix

      - name: Build Installer (Release & Test)
        run: |
          wix extension add -g WixToolset.UI.wixext
          wix build -ext WixToolset.UI.wixext -arch arm64 -d BuildVersion=$env:APP_VERSION scripts\EGoTouchSetup.wxs -loc scripts\zh-CN.wxl -out build\EGoTouchSetup_arm64.msi
          wix build -ext WixToolset.UI.wixext -arch arm64 -d BuildVersion=$env:APP_VERSION scripts\EGoTouchTestSetup.wxs -loc scripts\zh-CN.wxl -out build\EGoTouchTestSetup_arm64.msi

      - name: Upload Installer Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EGoTouch-Installers-ARM64
          path: build\*.msi
